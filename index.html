<body class="container d-flex justify-content-center">
    <div class="row flex-column mt-3 align-self-start">
        <div class="col-4 mb-1">
            <button type="button" class="btn btn-dark" onclick="location.reload()">Refresh</button>
        </div>
        <div class="col-4 mb-1">
            <button type="button" class="btn btn-dark">Generate New Card</button>
        </div>        
        <div class="col-4 mb-1">
            <button type="button" class="btn btn-dark">Add Timer</button>
        </div>
    </div>
    <div class="card m-3 d-flex justify-content-center align-self-center">
        <div class="d-flex card-body flex-column justify-content-between card-color">
            <div class="d-flex justify-content-start top">
            </div>
            <div class="d-flex justify-content-center middle">
            </div>
            <div class="d-flex justify-content-end bot">
            </div>
        </div>
    </div>
